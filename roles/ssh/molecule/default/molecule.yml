---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu-2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true

  - name: rocky-10
    image: geerlingguy/docker-rockylinux10-ansible:latest
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml

verifier:
  name: ansible
