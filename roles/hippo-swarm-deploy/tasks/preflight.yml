---
- name: Gather service facts
  ansible.builtin.service_facts:

- name: Assert Docker is running
  ansible.builtin.assert:
    that:
      - "'docker.service' in ansible_facts.services"
      - "ansible_facts.services['docker.service'].state == 'running'"
    fail_msg: "Docker is not running. Run the docker-install role first."

- name: Check Docker Swarm status
  ansible.builtin.command: docker info
  register: docker_info_out
  changed_when: false

- name: Assert node is a Swarm manager
  ansible.builtin.assert:
    that: "'Is Manager: true' in docker_info_out.stdout"
    fail_msg: "This node is not a Swarm manager. Run against a manager node."
