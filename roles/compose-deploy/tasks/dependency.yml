---
- name: Update apt cache (Debian)
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == "Debian"
  tags: update-cache

- name: Update dnf cache (RedHat)
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_os_family == "RedHat"
  tags: update-cache

- name: Install python3-pip
  ansible.builtin.package:
    name: python3-pip
    state: present

- name: Install Python Docker dependencies via pip (RedHat)
  ansible.builtin.pip:
    name:
      - docker
      - jsondiff
      - pyyaml
    state: present
  when: ansible_os_family == "RedHat"

- name: Install Python Docker dependencies via apt (Debian)
  ansible.builtin.apt:
    name:
      - python3-docker
      - python3-jsondiff
      - python3-yaml
    state: present
  when: ansible_os_family == "Debian"
