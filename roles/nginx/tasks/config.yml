---
- name: Remove default nginx configs (fresh install only)
  when: nginx_installed.rc != 0
  tags: [nginx, nginx_config]
  block:
    - name: Find sites-enabled files
      ansible.builtin.find:
        paths: /etc/nginx/sites-enabled
        file_type: file
      register: sites_enabled_files
      failed_when: false

    - name: Remove sites-enabled files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ sites_enabled_files.files | default([]) }}"

    - name: Find sites-available files
      ansible.builtin.find:
        paths: /etc/nginx/sites-available
        file_type: file
      register: sites_available_files
      failed_when: false

    - name: Remove sites-available files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ sites_available_files.files | default([]) }}"

    - name: Find conf.d files
      ansible.builtin.find:
        paths: /etc/nginx/conf.d
        file_type: file
      register: conf_d_files
      failed_when: false

    - name: Remove conf.d files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ conf_d_files.files | default([]) }}"

- name: Ensure required directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/includes
    - /etc/nginx/conf.d
  tags: [nginx, nginx_config]

- name: Deploy logformat include
  ansible.builtin.template:
    src: includes/logformat.conf.j2
    dest: /etc/nginx/includes/logformat.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx
  tags: [nginx, nginx_config]

- name: Deploy ip_allowlist include
  ansible.builtin.template:
    src: includes/ip_allowlist.conf.j2
    dest: /etc/nginx/includes/ip_allowlist.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx
  tags: [nginx, nginx_config]

- name: Deploy proxy_params include
  ansible.builtin.template:
    src: includes/proxy_params.conf.j2
    dest: /etc/nginx/includes/proxy_params.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx
  tags: [nginx, nginx_config]

- name: Deploy ssl_params include
  ansible.builtin.template:
    src: includes/ssl_params.conf.j2
    dest: /etc/nginx/includes/ssl_params.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx
  tags: [nginx, nginx_config]

- name: Deploy gzip_params include
  ansible.builtin.template:
    src: includes/gzip_params.conf.j2
    dest: /etc/nginx/includes/gzip_params.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx
  tags: [nginx, nginx_config]

- name: Deploy nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: restart nginx
  tags: [nginx, nginx_config]

- name: Deploy vhost configurations
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/conf.d/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_vhosts }}"
  when: nginx_vhosts | length > 0
  notify: restart nginx
  tags: [nginx, nginx_config]
