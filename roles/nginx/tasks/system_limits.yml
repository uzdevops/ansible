---
- name: Create nginx systemd override directory
  ansible.builtin.file:
    path: "{{ nginx_systemd_override_dir }}"
    state: directory
    mode: "0755"

- name: Deploy nginx systemd override for LimitNOFILE
  ansible.builtin.template:
    src: nginx_override.conf.j2
    dest: "{{ nginx_systemd_override_dir }}/override.conf"
    mode: "0644"
  notify:
    - reload systemd daemon
    - restart nginx

- name: Set fs.file-max sysctl
  ansible.posix.sysctl:
    name: fs.file-max
    value: "{{ nginx_fs_file_max }}"
    state: present
    reload: true

- name: Set net.core.somaxconn sysctl
  ansible.posix.sysctl:
    name: net.core.somaxconn
    value: "{{ nginx_somaxconn }}"
    state: present
    reload: true

- name: Set net.ipv4.tcp_max_syn_backlog sysctl
  ansible.posix.sysctl:
    name: net.ipv4.tcp_max_syn_backlog
    value: "{{ nginx_tcp_max_syn_backlog }}"
    state: present
    reload: true

- name: Configure nginx open file limits in limits.conf
  ansible.builtin.blockinfile:
    path: /etc/security/limits.conf
    marker: "# {mark} ANSIBLE MANAGED NGINX NOFILE LIMITS"
    block: |
      nginx soft nofile {{ nginx_limit_nofile }}
      nginx hard nofile {{ nginx_limit_nofile }}
      root  soft nofile {{ nginx_limit_nofile }}
      root  hard nofile {{ nginx_limit_nofile }}
      *     soft nofile {{ nginx_limit_nofile }}
      *     hard nofile {{ nginx_limit_nofile }}
