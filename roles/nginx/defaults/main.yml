---
# Worker
nginx_worker_connections: 16384

# Gzip
nginx_gzip_enabled: false

# IP access control
nginx_ip_allowlist: []
nginx_ip_blocklist: []

# Virtual hosts
nginx_vhosts: []

# Example vhost structure:
# nginx_vhosts:
#   - name: api.example.com
#     type: proxy
#     port: 80
#     ssl: false
#     upstream:
#       - server: 127.0.0.1:8000
#       - server: 127.0.0.1:8001
#     proxy_read_timeout: 120s   # optional
#
#   - name: app.example.com
#     type: proxy
#     port: 443
#     ssl: true
#     ssl_cert: /etc/ssl/certs/app.crt
#     ssl_key: /etc/ssl/private/app.key
#     upstream:
#       - server: 127.0.0.1:3000
#
#   - name: static.example.com
#     type: static
#     port: 80
#     root: /var/www/static
