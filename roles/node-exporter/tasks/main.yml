---
- name: Run preflight checks
  ansible.builtin.include_tasks: preflight.yml

- name: Ensure deploy directory exists
  ansible.builtin.file:
    path: "{{ node_exporter_deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [dirs]

- name: Deploy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ node_exporter_deploy_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart node-exporter stack
  tags: [compose]

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: node-exporter-stack.service.j2
    dest: /etc/systemd/system/{{ node_exporter_systemd_service }}.service
    mode: "0644"
  notify: restart node-exporter stack
  tags: [systemd]

- name: Enable and start node-exporter service
  ansible.builtin.systemd:
    name: "{{ node_exporter_systemd_service }}"
    state: started
    enabled: true
    daemon_reload: true
  tags: [systemd]
