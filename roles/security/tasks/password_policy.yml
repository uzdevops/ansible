---
- name: Install pam-pwquality (Ubuntu)
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"

- name: Install pam-pwquality (Rocky)
  ansible.builtin.dnf:
    name: libpwquality
    state: present
  when: ansible_os_family == "RedHat"

- name: Deploy pwquality configuration
  ansible.builtin.template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure faillock
  ansible.builtin.lineinfile:
    path: /etc/security/faillock.conf
    regexp: "^#?{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    state: present
    create: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - { key: deny,          value: "{{ faillock_deny }}" }
    - { key: unlock_time,   value: "{{ faillock_unlock_time }}" }
    - { key: fail_interval, value: "{{ faillock_fail_interval }}" }

- name: Enable faillock feature via authselect (Rocky)
  ansible.builtin.command: authselect enable-feature with-faillock
  when: ansible_os_family == "RedHat"
  register: authselect_result
  changed_when: "'already enabled' not in (authselect_result.stdout | default(''))"
  failed_when: authselect_result.rc != 0

- name: Create sudo I/O log directory
  ansible.builtin.file:
    path: "{{ sudo_log_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy sudo hardening config
  ansible.builtin.template:
    src: sudoers-hardening.j2
    dest: /etc/sudoers.d/hardening
    owner: root
    group: root
    mode: "0440"
    validate: '/usr/sbin/visudo -cf %s'
